name: Keepalive — Supabase + Fly.io

on:
  schedule:
    - cron: '0 12 */3 * *'  # Cada 3 días al mediodía UTC
  workflow_dispatch:          # Permite ejecución manual desde GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          echo "Pingeando https://casa-cambio-api.fly.dev/api/auth/health ..."
          response=$(curl -s -o response_body.txt -w "%{http_code}" \
            --max-time 60 \
            --retry 3 \
            --retry-delay 10 \
            --retry-connrefused \
            https://casa-cambio-api.fly.dev/api/auth/health)
          echo "HTTP status: $response"
          echo "Response body: $(cat response_body.txt)"
          if [ "$response" != "200" ]; then
            echo "ERROR: Health check falló con status $response"
            exit 1
          fi
          echo "OK: Supabase y Fly.io activos"

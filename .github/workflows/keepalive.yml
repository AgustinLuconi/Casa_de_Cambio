name: Keepalive — Supabase

on:
  schedule:
    - cron: '0 12 */2 * *'  # Cada 2 días al mediodía UTC
  workflow_dispatch:          # Permite ejecución manual desde GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "Pingeando Supabase REST API directamente..."
          response=$(curl -s -o response_body.txt -w "%{http_code}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            "https://vtyaunxljytbxbgyhmaz.supabase.co/rest/v1/" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY")
          echo "HTTP status: $response"
          echo "Response body (primeros 300 chars): $(cat response_body.txt | head -c 300)"
          if [ "$response" != "200" ]; then
            echo "ERROR: Supabase no está respondiendo — status $response"
            exit 1
          fi
          echo "OK: Supabase activo"
